<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOKI - AI智能秘书</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .app-container {
            width: 100%;
            max-width: 480px;
            height: 95vh;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 头部 */
        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo-icon {
            font-size: 24px;
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        .token-info {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }
        
        /* 功能导航 */
        .feature-nav {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .feature-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 12px 8px;
            background: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .feature-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .feature-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .feature-icon {
            font-size: 24px;
        }
        
        .feature-label {
            font-size: 11px;
            font-weight: 500;
        }
        
        /* 对话区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
        }
        
        .message-wrapper {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .bot-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 14px;
        }
        
        .message.bot {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        
        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        
        .user-message-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        
        /* 输入区域 */
        .input-container {
            padding: 15px;
            background: white;
            border-top: 1px solid #e9ecef;
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #userInput:focus {
            border-color: #667eea;
        }
        
        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
        }
        
        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .quick-actions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .quick-action {
            padding: 8px 16px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quick-action:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        /* 打字动画 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }
            
            .app-container {
                border-radius: 0;
                height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">🤖</span>
                <span class="logo-text">TOKI</span>
            </div>
            <div class="token-info">
                <span>💎</span>
                <span id="tokenCount">8,542</span>
                <span>/ 10,000</span>
            </div>
        </header>
        
        <!-- 功能导航 -->
        <div class="feature-nav">
            <button class="feature-btn active" onclick="switchFeature('chat')">
                <span class="feature-icon">💬</span>
                <span class="feature-label">对话</span>
            </button>
            <button class="feature-btn" onclick="window.location.href='voice-assistant/'">
                <span class="feature-icon">🎤</span>
                <span class="feature-label">语音</span>
            </button>
            <button class="feature-btn" onclick="alert('图像识别功能开发中')">
                <span class="feature-icon">📸</span>
                <span class="feature-label">识图</span>
            </button>
            <button class="feature-btn" onclick="window.open('https://toknm.hk', '_blank')">
                <span class="feature-icon">ℹ️</span>
                <span class="feature-label">关于</span>
            </button>
        </div>
        
        <!-- 对话区域 -->
        <main class="chat-container" id="chatContainer">
            <div class="message-wrapper">
                <div class="bot-avatar">🤖</div>
                <div class="message bot">
                    你好！我是TOKI，你的AI智能秘书。✨<br><br>
                    我可以帮你：<br>
                    💬 智能对话问答<br>
                    📝 文案写作助手<br>
                    🌐 翻译多语言<br>
                    💡 提供建议和创意<br><br>
                    有什么我可以帮你的吗？
                </div>
            </div>
        </main>
        
        <!-- 输入区域 -->
        <footer class="input-container">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="输入你的问题..."
                    autocomplete="off"
                >
                <button id="sendBtn" class="send-btn">发送</button>
            </div>
            <div class="quick-actions">
                <button class="quick-action" onclick="quickSend('你好')">👋 打招呼</button>
                <button class="quick-action" onclick="quickSend('写一首诗')">📝 写诗</button>
                <button class="quick-action" onclick="quickSend('讲个笑话')">😄 笑话</button>
                <button class="quick-action" onclick="quickSend('翻译Hello')">🌐 翻译</button>
                <button class="quick-action" onclick="quickSend('写文案')">✍️ 文案</button>
            </div>
        </footer>
    </div>
    
    <script>
        // 状态管理
        const state = {
            tokens: 8542,
            maxTokens: 10000,
            messages: [],
            isTyping: false
        };
        
        // DOM 元素
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const tokenCount = document.getElementById('tokenCount');
        
        // 智谱AI配置
        const ZHIPU_API_KEY = 'c4911cf15f844167bd26301e25622cf1.n1BU10ytXbnQ6N5d';
        const ZHIPU_API_URL = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
        });
        
        // 事件监听
        function setupEventListeners() {
            sendBtn.addEventListener('click', sendMessage);
            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }
        
        // 发送消息
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || state.isTyping) return;
            
            // 检查Token余额
            if (state.tokens <= 0) {
                addMessage('Token余额不足，请升级套餐', 'bot');
                return;
            }
            
            // 显示用户消息
            addMessage(message, 'user');
            userInput.value = '';
            sendBtn.disabled = true;
            
            // 显示输入动画
            showTypingIndicator();
            
            try {
                // 调用智谱AI
                const response = await fetch(ZHIPU_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${ZHIPU_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'glm-4-flash',
                        messages: [{ role: 'user', content: message }],
                        temperature: 0.7,
                        max_tokens: 1000
                    })
                });
                
                if (!response.ok) throw new Error('API错误');
                
                const data = await response.json();
                const text = data.choices[0].message.content;
                const tokens = data.usage?.total_tokens || 100;
                
                // 移除输入动画
                hideTypingIndicator();
                
                // 显示AI回复
                addMessage(text, 'bot');
                
                // 扣除Token
                state.tokens -= tokens;
                updateTokenDisplay();
                
            } catch (error) {
                hideTypingIndicator();
                addMessage('网络连接失败，请重试', 'bot');
            }
            
            sendBtn.disabled = false;
        }
        
        // 快捷发送
        function quickSend(text) {
            userInput.value = text;
            sendMessage();
        }
        
        // 添加消息
        function addMessage(text, type) {
            const div = document.createElement('div');
            
            if (type === 'user') {
                div.className = 'user-message-wrapper';
                div.innerHTML = `<div class="message user">${escapeHtml(text)}</div>`;
            } else {
                div.className = 'message-wrapper';
                div.innerHTML = `
                    <div class="bot-avatar">🤖</div>
                    <div class="message bot">${escapeHtml(text)}</div>
                `;
            }
            
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 显示输入动画
        function showTypingIndicator() {
            state.isTyping = true;
            const div = document.createElement('div');
            div.className = 'message-wrapper';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="bot-avatar">🤖</div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 隐藏输入动画
        function hideTypingIndicator() {
            state.isTyping = false;
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }
        
        // 更新Token显示
        function updateTokenDisplay() {
            tokenCount.textContent = state.tokens.toLocaleString();
            if (state.tokens < 1000) {
                tokenCount.style.color = '#ff4444';
            } else if (state.tokens < 3000) {
                tokenCount.style.color = '#ff8800';
            }
        }
        
        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }
        
        // 切换功能
        function switchFeature(feature) {
            const btns = document.querySelectorAll('.feature-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            event.target.closest('.feature-btn').classList.add('active');
        }
    </script>
</body>
</html>
