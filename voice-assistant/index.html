<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOKI - 语音助手</title>
    
    <!-- PWA配置 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TOKI">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    
    <link rel="stylesheet" href="voice-style.css">
</head>
<body>
    <div class="voice-container">
        <!-- 头部 -->
        <header class="voice-header">
            <div class="logo">
                <span class="logo-icon">🤖</span>
                <span class="logo-text">TOKI</span>
            </div>
            <div class="status" id="status">
                <span class="status-dot"></span>
                <span class="status-text">准备就绪</span>
            </div>
        </header>

        <!-- 对话区域 -->
        <main class="conversation" id="conversation">
            <div class="welcome">
                <div class="bot-avatar">🤖</div>
                <div class="message bot">
                    你好！我是TOKI，你的语音助手。
                    <br><br>
                    点击下方麦克风按钮，或说"嘿TOKI"开始对话。
                </div>
            </div>
        </main>

        <!-- 语音控制区 -->
        <footer class="voice-controls">
            <div class="voice-button-wrapper">
                <button class="voice-button" id="voiceButton">
                    <div class="mic-icon">🎤</div>
                    <div class="pulse-ring"></div>
                </button>
                <div class="hint" id="hint">按住说话</div>
            </div>
            
            <div class="transcript" id="transcript">
                <div class="transcript-text">点击麦克风开始对话...</div>
            </div>
        </footer>

        <!-- 设置面板 -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <h3>设置</h3>
                <button class="close-btn" id="closeSettings">×</button>
            </div>
            <div class="settings-content">
                <div class="setting-item">
                    <label>语音唤醒</label>
                    <input type="checkbox" id="wakeWordEnabled" checked>
                </div>
                <div class="setting-item">
                    <label>语音速度</label>
                    <input type="range" id="speechRate" min="0.5" max="2" step="0.1" value="1">
                </div>
                <div class="setting-item">
                    <label>离线模式</label>
                    <input type="checkbox" id="offlineMode">
                </div>
            </div>
        </div>

        <!-- 设置按钮 -->
        <button class="settings-btn" id="settingsBtn">⚙️</button>
    </div>

    <script src="enhanced-voice-app.js"></script>
    
    <!-- PWA安装提示 -->
    <div id="installPrompt" class="install-prompt">
        <div class="install-content">
            <div class="install-icon">🤖</div>
            <div class="install-text">
                <h3>安装TOKI到手机</h3>
                <p>像真正的APP一样使用</p>
            </div>
            <div class="install-buttons">
                <button id="installBtn" class="install-btn">安装</button>
                <button id="dismissBtn" class="dismiss-btn">稍后</button>
            </div>
        </div>
    </div>
    
    <script>
        // 注册Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('✅ Service Worker 注册成功:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('❌ Service Worker 注册失败:', error);
                    });
            });
        }
        
        // PWA安装提示
        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installBtn = document.getElementById('installBtn');
        const dismissBtn = document.getElementById('dismissBtn');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // 显示安装提示
            setTimeout(() => {
                installPrompt.classList.add('show');
            }, 3000);
        });
        
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log('用户选择:', outcome);
                deferredPrompt = null;
                installPrompt.classList.remove('show');
            }
        });
        
        dismissBtn.addEventListener('click', () => {
            installPrompt.classList.remove('show');
        });
        
        // 已安装后隐藏提示
        window.addEventListener('appinstalled', () => {
            console.log('✅ TOKI已安装');
            installPrompt.classList.remove('show');
        });
    </script>
</body>
</html>
