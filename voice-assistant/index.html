<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOKI - 语音助手</title>
    
    <!-- PWA配置 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TOKI">
    
    <link rel="stylesheet" href="voice-style.css">
    
    <style>
        /* 视频通话按钮 */
        .video-call-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s;
            z-index: 10;
        }
        
        .video-call-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-50%) scale(1.1);
        }
        
        /* 视频容器 */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: none;
            flex-direction: column;
        }
        
        .video-container.active {
            display: flex;
        }
        
        .video-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* 镜像 */
        }
        
        .video-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 1001;
        }
        
        .video-controls button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .end-call-btn {
            background: #ff4444;
            color: white;
        }
        
        .end-call-btn:hover {
            background: #cc0000;
        }
        
        .mute-video-btn, .mute-audio-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        
        .mute-video-btn:hover, .mute-audio-btn:hover {
            background: white;
        }
        
        /* 语音按钮触摸反馈 */
        .voice-button.touch-active {
            transform: scale(0.95);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.8);
        }
        
        /* 语音按钮优化 */
        .voice-button {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        /* 移动端优化 */
        @media (max-width: 768px) {
            .video-controls {
                flex-wrap: wrap;
                justify-content: center;
                padding: 0 10px;
            }
            
            .video-controls button {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="voice-container">
        <!-- 头部 -->
        <header class="voice-header">
            <div class="logo">
                <span class="logo-icon">🤖</span>
                <span class="logo-text">TOKI</span>
            </div>
            <div class="status" id="status">
                <span class="status-dot"></span>
                <span class="status-text">准备就绪</span>
            </div>
        </header>

        <!-- 对话区域 -->
        <main class="conversation" id="conversation">
            <div class="welcome">
                <div class="bot-avatar">🤖</div>
                <div class="message bot">
                    你好！我是TOKI，你的语音助手。
                    <br><br>
                    点击下方麦克风按钮开始对话。
                </div>
            </div>
        </main>

        <!-- 语音控制区 -->
        <footer class="voice-controls">
            <div class="voice-button-wrapper">
                <button class="voice-button" id="voiceButton">
                    <div class="mic-icon">🎤</div>
                    <div class="pulse-ring"></div>
                </button>
                <div class="hint" id="hint">点击说话</div>
            </div>
            
            <div class="transcript" id="transcript">
                <div class="transcript-text">点击麦克风开始对话...</div>
            </div>
        </footer>

        <!-- 设置面板 -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <h3>设置</h3>
                <button class="close-btn" id="closeSettings">×</button>
            </div>
            <div class="settings-content">
                <div class="setting-item">
                    <label>语音唤醒</label>
                    <input type="checkbox" id="wakeWordEnabled" checked>
                </div>
                <div class="setting-item">
                    <label>语音速度</label>
                    <input type="range" id="speechRate" min="0.5" max="2" step="0.1" value="1">
                </div>
            </div>
        </div>

        <!-- 设置按钮 -->
        <button class="settings-btn" id="settingsBtn">⚙️</button>
    </div>

    <!-- 加载完整版代码 -->
    <script src="complete-voice-app.js"></script>
</body>
</html>
