<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOKI - AI智能秘书v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            height: 95vh;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 8px; }
        .logo-icon { font-size: 24px; }
        .logo-text { font-size: 20px; font-weight: bold; }
        .version { 
            background: rgba(255,255,255,0.2); 
            padding: 4px 8px; 
            border-radius: 10px;
            font-size: 10px;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
        }
        .message-wrapper { display: flex; gap: 8px; margin-bottom: 15px; }
        .bot-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 14px;
        }
        .message.bot {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .message img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
        }
        .user-message-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        .routing-info {
            font-size: 10px;
            color: #888;
            margin-top: 4px;
            padding: 2px 6px;
            background: #f0f0f0;
            border-radius: 4px;
            display: inline-block;
        }
        .input-container {
            padding: 15px;
            background: white;
            border-top: 1px solid #e9ecef;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }
        #userInput:focus { border-color: #667eea; }
        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .quick-actions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .quick-action {
            padding: 8px 16px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
        }
        .quick-action:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">🤖</span>
                <span class="logo-text">TOKI</span>
                <span class="version">v2.0</span>
            </div>
            <div>💎 10,000</div>
        </header>
        
        <main class="chat-container" id="chatContainer">
            <div class="message-wrapper">
                <div class="bot-avatar">🤖</div>
                <div class="message bot">
                    ✅ 新版本已加载！<br><br>
                    现在支持：<br>
                    🎨 图像生成（说"画一只猫"）<br>
                    💬 文本对话<br><br>
                    试试"画一只猫"！
                </div>
            </div>
        </main>
        
        <footer class="input-container">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="说'画一只猫'试试" autocomplete="off">
                <button id="sendBtn" class="send-btn">发送</button>
            </div>
            <div class="quick-actions">
                <button class="quick-action" onclick="quickSend('画一只可爱的猫')">🎨 画图</button>
                <button class="quick-action" onclick="quickSend('你好')">💬 对话</button>
                <button class="quick-action" onclick="quickSend('讲个笑话')">😄 笑话</button>
            </div>
        </footer>
    </div>
    
    <script>
        const API_KEY = 'c4911cf15f844167bd26301e25622cf1.n1BU10ytXbnQ6N5d';
        const BASE_URL = 'https://open.bigmodel.cn/api/paas/v4';
        
        console.log('✅ TOKI v2.0 已加载');
        
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        function quickSend(text) {
            userInput.value = text;
            sendMessage();
        }
        
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            addMessage(message, 'user');
            userInput.value = '';
            sendBtn.disabled = true;
            
            // 判断是否是图像生成
            const isImageGen = message.includes('画') || message.includes('生成图');
            
            try {
                if (isImageGen) {
                    // 🎨 图像生成
                    console.log('🎨 调用图像生成API...');
                    
                    const response = await fetch(`${BASE_URL}/images/generations`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${API_KEY}`
                        },
                        body: JSON.stringify({
                            model: 'cogview-3-flash',
                            prompt: message
                        })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        const imageUrl = data.data[0].url;
                        console.log('📸 图片URL:', imageUrl);
                        
                        addMessage(`<img src="${imageUrl}" style="max-width:100%;border-radius:8px;">`, 'bot', {type: 'image_gen', model: 'cogview-3-flash'});
                        addMessage('🎨 图片生成成功！', 'bot');
                    } else {
                        throw new Error('图像生成失败');
                    }
                } else {
                    // 💬 文本对话
                    console.log('💬 调用文本对话API...');
                    
                    const response = await fetch(`${BASE_URL}/chat/completions`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${API_KEY}`
                        },
                        body: JSON.stringify({
                            model: 'glm-4-flash',
                            messages: [{role: 'user', content: message}]
                        })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        const text = data.choices[0].message.content;
                        addMessage(text, 'bot', {type: 'text', model: 'glm-4-flash'});
                    } else {
                        throw new Error('对话失败');
                    }
                }
            } catch (error) {
                console.error('❌ 错误:', error);
                addMessage('请求失败，请重试', 'bot');
            }
            
            sendBtn.disabled = false;
        }
        
        function addMessage(content, type, routing = null) {
            const div = document.createElement('div');
            
            if (type === 'user') {
                div.className = 'user-message-wrapper';
                div.innerHTML = `<div class="message user">${content}</div>`;
            } else {
                div.className = 'message-wrapper';
                let routingHtml = routing ? `<div class="routing-info">🔀 ${routing.type} → ${routing.model}</div>` : '';
                div.innerHTML = `
                    <div class="bot-avatar">🤖</div>
                    <div>
                        <div class="message bot">${content}</div>
                        ${routingHtml}
                    </div>
                `;
            }
            
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
